
    <!-- Portfolio Grid Section -->
    <section id="portfolio">
        <div class="container portfolio-flex-grid">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2>Portfolio</h2>
                    <hr class="star-primary">
                </div>
            </div>
            <div class="portfolio-flex-row">
                {% for post in site.posts %}
                    <div class="portfolio-flex-item portfolio-item">
                        <a href="#portfolioModal-{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
                            <div class="caption">
                                <!-- <div class="caption-content">
                                    <i class="fa fa-search-plus fa-3x"></i>
                                </div> -->
                                <div class="caption-content">
                                    <span>
                                      <h3>{{ post.title }}</h3>
                                    </span>
                                    <span>{{ post.description }}</span>
                                    <span>{{ post.category2 }}</span>
                                    <br>
                                    <span>
                                      <i class="fa fa-search-plus"></i>
                                    </span>
                                  </div>
                            </div>
                            <img src="img/portfolio/{{ post.modal-id }}/{{ post.logo }}" class="img-responsive" alt="{{ post.alt }}">
                        </a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
